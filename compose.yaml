#-[ PROJECT NAME
name: "arcane-cluster"

# As of July 10th, 2026: I haven't been able to get the Arcane agents working without the local docker socket.
# Until the agents can run without the local docker socket (or until I figure it out), there's no point running the main instance
# behind a socket proxy.

services:
  arcane:
    image: ghcr.io/getarcaneapp/manager:${ARCANE_IMAGE_TAG:-latest}
    container_name: arcane
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - arcane.data:/app/data
    environment:
      - PUID=1000
      - PGID=1000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - APP_URL=${APP_URL}
      - POSTGRES_DB=arcane
      - POSTGRES_USER=${POSTGRES_USER:-arcane}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - OIDC_ENABLED=${OIDC_ENABLED:-false}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL}
      - OIDC_SCOPES=${OIDC_SCOPES:-openid email profile groups}
      - OIDC_GROUPS_CLAIM=${OIDC_GROUPS_CLAIM}
      - OIDC_ROLE_MAPPINGS=${OIDC_ROLE_MAPPINGS}
      - OIDC_SKIP_TLS_VERIFY=false
      - OIDC_AUTO_REDIRECT_TO_PROVIDER=${OIDC_AUTO_REDIRECT_TO_PROVIDER:-false}
      - OIDC_MERGE_ACCOUNTS=${OIDC_MERGE_ACCOUNTS:-false}
      - OIDC_PROVIDER_NAME=${OIDC_PROVIDER_NAME:-pocket-id}
      - OIDC_PROVIDER_LOGO_URL=${OIDC_PROVIDER_LOGO_URL:-https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/pocket-id.svg}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@arcane-postgres:5432/${POSTGRES_DB}
      - LIFECYCLE_ENABLED=${LIFECYCLE_ENABLED}
    networks:
      - arcane-cloudflare
      - arcane-cluster
      - arcane-backend
    depends_on:
      - arcane-caddy
      - arcane-postgres
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3552/api/health >/dev/null || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  arcane-postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-17}
    container_name: arcane-postgres
    restart: unless-stopped
    networks:
      - arcane-backend
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - arcane-postgres.data:/var/lib/postgresql/data

  arcane-cloudflared:
    image: cloudflare/cloudflared:${CLOUDFLARED_IMAGE_TAG:-latest}
    container_name: arcane-cloudflared
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: 10
    networks:
      - arcane-cloudflare
    restart: unless-stopped

  # Caddy - Reverse Proxy for the Arcane Cluster
  arcane-caddy:
    build:
      context: .
      dockerfile: ./caddy/Dockerfile
    container_name: arcane-caddy
    environment:
      - BASE_URL=${BASE_URL}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - SSL_EMAIL=${SSL_EMAIL}
    networks:
      - arcane-cluster
    ports:
      - 80:80
      - 443:443
    restart: unless-stopped
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - arcane-caddy.data:/data

networks:
  arcane-cloudflare:
    driver: bridge
    name: arcane-cloudflare
  arcane-cluster:
    driver: bridge
    name: arcane-cluster
  arcane-backend:
    driver: bridge
    name: arcane-backend

volumes:
  arcane.data:
    name: arcane.data
  arcane-postgres.data:
    name: arcane-postgres.data
  arcane-caddy.data:
    name: arcane-caddy.data
