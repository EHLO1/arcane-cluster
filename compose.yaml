services:
  arcane-socket-proxy:
    image: tecnativa/docker-socket-proxy:${SOCKET_PROXY_IMAGE_TAG:-latest}
    container_name: arcane-socket-proxy
    environment:
      - EVENTS=1
      - PING=1
      - VERSION=1
      # Security critical
      - AUTH=0
      - SECRETS=0
      - POST=1
      # Not always needed
      - BUILD=1
      - COMMIT=0
      - CONFIGS=0
      - CONTAINERS=1
      - DISTRIBUTION=0
      - EXEC=1
      - IMAGES=1
      - INFO=1
      - NETWORKS=1
      - NODES=0
      - PLUGINS=0
      - SERVICES=1
      - SESSION=0
      - SWARM=1
      - SYSTEM=0
      - TASKS=1
      - VOLUMES=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - arcane-socket-proxy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  arcane:
    image: ghcr.io/getarcaneapp/manager:${ARCANE_IMAGE_TAG:-latest}
    container_name: arcane
    volumes:
      - arcane.data:/app/data
    environment:
      - PUID=1000
      - PGID=1000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - APP_URL=${APP_URL}
      - DOCKER_HOST=tcp://arcane-socket-proxy:2375
      - POSTGRES_DB=arcane
      - POSTGRES_USER=${POSTGRES_USER:-arcane}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - OIDC_ENABLED=${OIDC_ENABLED:-false}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL}
      - OIDC_SCOPES=${OIDC_SCOPES:-openid email profile groups}
      - OIDC_GROUPS_CLAIM=${OIDC_GROUPS_CLAIM}
      - OIDC_ROLE_MAPPINGS=${OIDC_ROLE_MAPPINGS}
      - OIDC_SKIP_TLS_VERIFY=false
      - OIDC_AUTO_REDIRECT_TO_PROVIDER=${OIDC_AUTO_REDIRECT_TO_PROVIDER:-false}
      - OIDC_MERGE_ACCOUNTS=${OIDC_MERGE_ACCOUNTS:-false}
      - OIDC_PROVIDER_NAME=${OIDC_PROVIDER_NAME:-pocket-id}
      - OIDC_PROVIDER_LOGO_URL=${OIDC_PROVIDER_LOGO_URL:-https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/pocket-id.svg}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@arcane-postgres:5432/${POSTGRES_DB}
    networks:
      - arcane-socket-proxy
      - arcane-cloudflare
      - arcane-backend
    depends_on:
      - arcane-socket-proxy
      - arcane-postgres
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3552/api/health >/dev/null || exit 1']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  arcane-postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-18-alpine}
    container_name: arcane-postgres
    restart: unless-stopped
    networks:
      - arcane-backend
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - arcane-postgres.data:/var/lib/postgresql/data

  arcane-cloudflared:
    image: cloudflare/cloudflared:${CLOUDFLARED_IMAGE_TAG:-latest}
    container_name: arcane-cloudflared
    command: "tunnel run"
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    networks:
      - arcane-cloudflare
    restart: unless-stopped

  # Caddy - Reverse Proxy for Arcane Cluster + TLS
  arcane-caddy:
    build:
      context: "."
      dockerfile: "./Dockerfile"
    image: "caddy:${CADDY_IMAGE_TAG:-latest}"
    container_name: "arcane-caddy"
    environment:
      - "ARCANE_MANAGER_URL=${ARCANE_MANAGER_URL}"
      - "CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}"
      - "SSL_EMAIL=${SSL_EMAIL}"
    networks:
      - "arcane-cluster"
    restart: "unless-stopped"
    volumes:
      - "./caddy/Caddyfile:/etc/caddy/Caddyfile:ro"
      - "arcane-caddy.data:/data"

networks:
  arcane-socket-proxy:
    driver: bridge
    name: arcane-socket-proxy
  arcane-cloudflare:
    driver: bridge
    name: arcane-cloudflare
  arcane-backend:
    driver: bridge
    name: arcane-backend
  arcane-cluster:
    driver: bridge
    name: arcane-cluster

volumes:
  arcane.data:
    name: arcane.data
  arcane-postgres.data:
    name: arcane-postgres.data
  arcane-caddy.data:
    name: arcane-caddy.data